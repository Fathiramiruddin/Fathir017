<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Biodata Mahasiswa</title>
    <style>
        /* CSS Dasar dan Sederhana */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-simpan { background-color: #28a745; color: white; }
        .btn-edit { background-color: #ffc107; color: black; padding: 5px 10px; margin-right: 5px; }
        .btn-hapus { background-color: #dc3545; color: white; padding: 5px 10px; }
        .btn-batal { background-color: #6c757d; color: white; padding: 10px 15px; }
        .btn-batal-kecil { background-color: #6c757d; color: white; padding: 5px 10px; margin-left: 5px; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #007bff;
            color: white;
        }

        .modal {
            display: none; 
            position: fixed;
            z-index: 10;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5); 
        }
        .modal-content {
            background-color: #fff;
            margin: 15% auto; 
            padding: 20px;
            border-radius: 8px;
            width: 300px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* Tambahan CSS untuk kotak pencarian */
        .search-box {
            margin-bottom: 15px;
            display: flex;
            justify-content: flex-end;
        }
        .search-box input {
            width: 50%;
            padding: 8px;
            border: 1px solid #007bff;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sistem Informasi Biodata Mahasiswa</h1>
        
        <form id="formMahasiswa" onsubmit="simpanData(event)">
            <div class="form-group">
                <label>NIM:</label>
                <input type="text" id="nim" required placeholder="Masukkan NIM">
            </div>
            <div class="form-group">
                <label>Nama Lengkap:</label>
                <input type="text" id="nama" required placeholder="Masukkan Nama">
            </div>
            <div class="form-group">
                <label>Program Studi:</label>
                <select id="prodi">
                    <option value="TRPL">Teknologi Rekayasa Perangkat Lunak</option>
                    <option value="TI">Teknik Informatika</option>
                    <option value="IK">Ilmu Komunikasi</option>
                </select>
            </div>
            <div class="form-group">
                <label>Semester:</label>
                <input type="number" id="semester" required min="1" max="14" placeholder="Contoh: 4">
            </div>
            
            <button type="submit" class="btn-simpan" id="btnSimpan">Simpan Data</button>
            <button type="button" onclick="resetForm()" class="btn-batal">Batal</button>
        </form>

        <hr style="margin: 30px 0;">

        <h2>Daftar Mahasiswa</h2>
        
        <div class="search-box">
            <input type="text" id="keywordCari" placeholder="🔍 Cari Nama atau NIM..." oninput="cariData()">
        </div>

        <table>
            <thead>
                <tr>
                    <th>NIM</th>
                    <th>Nama</th>
                    <th>Prodi</th>
                    <th>Semester</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="tabelBody">
                </tbody>
        </table>
    </div>

    <div id="modalKonfirmasi" class="modal">
        <div class="modal-content">
            <p style="margin-bottom: 20px; font-weight: bold;">Apakah Anda yakin ingin menghapus data ini?</p>
            <button class="btn-hapus" onclick="prosesHapus()">Ya, Hapus</button>
            <button class="btn-batal-kecil" onclick="tutupModal()">Tidak</button>
        </div>
    </div>

    <script>
        let dataMahasiswa = [];
        let indexEdit = -1; 
        let indexHapus = -1;

        // FITUR BARU: Modifikasi fungsi tampilkanTabel agar bisa menerima data hasil pencarian
        function tampilkanTabel(dataYangDitampilkan = dataMahasiswa) {
            const tbody = document.getElementById('tabelBody');
            tbody.innerHTML = ''; 

            if (dataYangDitampilkan.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Belum ada data / Data tidak ditemukan</td></tr>';
                return;
            }

            for (let i = 0; i < dataYangDitampilkan.length; i++) {
                let mhs = dataYangDitampilkan[i];
                
                // Cari index asli di array dataMahasiswa agar tombol edit/hapus tetap berfungsi
                let indexAsli = dataMahasiswa.indexOf(mhs);

                let baris = `
                    <tr>
                        <td>${mhs.nim}</td>
                        <td>${mhs.nama}</td>
                        <td>${mhs.prodi}</td>
                        <td>${mhs.semester}</td>
                        <td>
                            <button class="btn-edit" onclick="siapkanEdit(${indexAsli})">Edit</button>
                            <button class="btn-hapus" onclick="hapusData(${indexAsli})">Hapus</button>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += baris;
            }
        }

        // FITUR BARU: Fungsi untuk melakukan pencarian
        function cariData() {
            let keyword = document.getElementById('keywordCari').value.toLowerCase();
            
            // Saring (filter) data yang nama atau NIM-nya mengandung huruf yang diketik
            let hasilPencarian = dataMahasiswa.filter(mhs => 
                mhs.nama.toLowerCase().includes(keyword) || 
                mhs.nim.toLowerCase().includes(keyword)
            );

            // Tampilkan tabel dengan data hasil pencarian saja
            tampilkanTabel(hasilPencarian);
        }

        function simpanData(event) {
            event.preventDefault(); 

            let inputNim = document.getElementById('nim').value;
            let inputNama = document.getElementById('nama').value;
            let inputProdi = document.getElementById('prodi').value;
            let inputSemester = document.getElementById('semester').value;

            // Validasi NIM Duplikat (Fitur yang kamu minta sebelumnya)
            let nimDuplikat = false;
            for (let i = 0; i < dataMahasiswa.length; i++) {
                if (dataMahasiswa[i].nim === inputNim && i !== indexEdit) {
                    nimDuplikat = true;
                    break;
                }
            }

            if (nimDuplikat) {
                alert("Gagal menyimpan! NIM tersebut sudah terdaftar.");
                return; 
            }

            let mahasiswaBaru = {
                nim: inputNim,
                nama: inputNama,
                prodi: inputProdi,
                semester: inputSemester
            };

            if (indexEdit === -1) {
                dataMahasiswa.push(mahasiswaBaru);
            } else {
                dataMahasiswa[indexEdit] = mahasiswaBaru;
            }

            resetForm();
            // Kosongkan kolom pencarian setiap kali menyimpan data baru
            document.getElementById('keywordCari').value = ''; 
            tampilkanTabel();
        }

        function siapkanEdit(index) {
            let mhs = dataMahasiswa[index];
            
            document.getElementById('nim').value = mhs.nim;
            document.getElementById('nama').value = mhs.nama;
            document.getElementById('prodi').value = mhs.prodi;
            document.getElementById('semester').value = mhs.semester;

            indexEdit = index; 
            document.getElementById('btnSimpan').innerText = "Update Data";
        }

        function hapusData(index) {
            indexHapus = index; 
            document.getElementById('modalKonfirmasi').style.display = 'block'; 
        }

        function prosesHapus() {
            if (indexHapus !== -1) {
                dataMahasiswa.splice(indexHapus, 1); 
                document.getElementById('keywordCari').value = ''; // Reset pencarian
                tampilkanTabel();
                resetForm(); 
                tutupModal(); 
            }
        }

        function tutupModal() {
            document.getElementById('modalKonfirmasi').style.display = 'none';
            indexHapus = -1; 
        }

        function resetForm() {
            document.getElementById('formMahasiswa').reset();
            indexEdit = -1; 
            document.getElementById('btnSimpan').innerText = "Simpan Data";
        }

        tampilkanTabel();

    </script>
</body>
</html>
